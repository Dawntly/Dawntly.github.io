<!DOCTYPE html>
<html>
  <head>
    <title>{{ page.title }} Your Vittles Vending</title>
    <meta name="viewport" content="width=device-width">
    <link rel="stylesheet" type="text/css" href="/css/main.css">
    {% if page.css %}
        <link rel="stylesheet"type="text/css" href="/css/{{ page.css }}.css" />
    {% endif %}
  </head>
  
  <body>
    <div class="wraper">
      
      {% include nav.html %}
      
      <div class="stripes"></div>

      <div class="container">
        <h1 class="title">{{ page.header }}</h1>
        {% if page.slogan %}
          <h2 class="slogan"><em>{{ page.slogan }}</em></h2>
        {% endif %}
  
        <img class="machine" src="/assets/vendingmachine.jpg"/>
        
        {{ content }}
      </div>

    </div>
  </body>
</html>
